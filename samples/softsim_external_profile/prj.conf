# --- SoftSIM profile source -------------------------------------------------
# Default: EXTERNAL - the device waits for a profile over serial on first boot,
# provisions it, then reboots.
#
# For STATIC mode, uncomment the two lines below and replace the profile string with
# your Onomondo SoftSIM profile (hex string, as printed by `./softsim next` of the SoftSIM CLI Tool).
# CONFIG_SOFTSIM_STATIC_PROFILE_ENABLE=y
# CONFIG_SOFTSIM_STATIC_PROFILE="01120809101010325476980214980010325476981032140320000000000000000000000000000000000420000102030405060708090A0B0C0D0E0F0520000102030405060708090A0B0C0D0E0F0620000102030405060708090A0B0C0D0E0F"

# Configured to allow a reboot following the provisioning of a profile
CONFIG_REBOOT=y

# SoftSIM debug logging
CONFIG_SOFTSIM_NRF_DEBUG_LOGS=y
CONFIG_SOFTSIM_LIBS_DEBUG_LOGS=n

# Lossless library trace (debug only, buadrate 1000000); see SOFTSIM_LOG_IMMEDIATE_MODE Kconfig help.
# CONFIG_LOG_MODE_IMMEDIATE=y

# Factory reset the modem - helpful for development when the modem may be in an unknown state.
CONFIG_SOFTSIM_FACTORY_RESET_ON_PROVISION=n

# Modem Configurations
CONFIG_NRF_MODEM_LIB=y

# nRF modem library logging, linking the log-capable modem-library when enabled.
# CONFIG_NRF_MODEM_LOG=y
# CONFIG_NRF_MODEM_LIB_LOG_LEVEL_DBG=y

# NET Configurations
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_NATIVE=n
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_POSIX_API=y

# LTE Configurations
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_LC_PSM_MODULE=y
CONFIG_LTE_LC_EDRX_MODULE=y

# AT host library
CONFIG_SERIAL=y
CONFIG_AT_HOST_LIBRARY=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Reduce the size of TF-M by disabling the PS
CONFIG_TFM_PARTITION_PROTECTED_STORAGE=n
CONFIG_PSA_CRYPTO_DRIVER_CC3XX=n

# Reduce the size of the TF-M partition
# when combined with static partitioning
CONFIG_PM_PARTITION_SIZE_TFM=0x10000

# The bootloader adds a small mcuboot_pad partition,
# whose size must be subtracted from the TF-M partition
#CONFIG_BOOTLOADER_MCUBOOT=y
#CONFIG_PM_PARTITION_SIZE_TFM=0xfe00

