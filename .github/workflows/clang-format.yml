name: Check Codebase Formatting

on:
  pull_request:
    paths-ignore:
      - 'modules/lib/onomondo-uicc/**'
      - 'modules/lib/onomondo-uicc'

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Run clang-format check
        run: |
          # find source files, then filter to project directories we care about
          # explicitly exclude any files that are part of the onomondo-uicc submodule
          FILES=$(find lib samples -name "*.c" -o -name "*.h" \
            | grep -E "(lib/|samples/softsim_(external|static)_profile/)" \
            | grep -v "lib/include/" \
            | grep -v "lib/onomondo-uicc/")
          clang-format --dry-run -Werror $FILES
