name: Lint Commit Messages

on: pull_request

jobs:
  commitlint:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Linting commit messages
        uses: wagoid/commitlint-github-action@v5

